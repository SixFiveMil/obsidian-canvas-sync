name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Type check browser extension
        run: npx tsc -p apps/browser-extension/tsconfig.json --noEmit

      - name: Type check Obsidian plugin
        run: npx tsc -p apps/obsidian-plugin/tsconfig.json --noEmit

      - name: Build all
        run: npm run build

      - name: Validate extension dist and manifest
        run: node apps/browser-extension/scripts/validate-dist.mjs
